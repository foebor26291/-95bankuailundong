<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沪深股市95个行业板块资金轮动热力图（2020-2025）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;font-size:13px;background:#fff;color:#1a1a1a;padding:16px}
h1{font-size:16px;font-weight:500;margin-bottom:12px;color:#1a1a1a}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center}
.controls select,.controls input{font-size:12px;padding:5px 8px;border-radius:6px;background:#fff;color:#1a1a1a;border:1px solid #ccc;outline:none}
.controls label{font-size:12px;color:#666}
.stat-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.stat{background:#f5f5f5;border-radius:6px;padding:5px 10px;font-size:11px;color:#666}
.stat b{color:#1a1a1a;font-weight:500}
.tab-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tab-bar button{font-size:12px;padding:5px 14px;border-radius:6px;background:transparent;border:1px solid #ccc;color:#666;cursor:pointer}
.tab-bar button.active{background:#f0f0f0;color:#1a1a1a;border-color:#999;font-weight:500}
.legend{display:flex;align-items:center;gap:6px;font-size:11px;color:#666;margin-bottom:8px;flex-wrap:wrap}
.lg{display:flex;gap:3px}
.lg span{width:18px;height:12px;border-radius:2px;display:inline-block}
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:75vh;border:1px solid #e0e0e0;border-radius:8px}
table{border-collapse:collapse;min-width:700px;width:100%}
thead{position:sticky;top:0;z-index:10}
thead tr th{background:#f7f7f7;padding:7px 10px;font-size:11px;font-weight:500;color:#666;border-bottom:1px solid #ddd;white-space:nowrap;text-align:center}
thead tr th:first-child{text-align:left}
tbody tr:hover{background:#fafafa}
td{padding:4px 8px;border-bottom:1px solid #f0f0f0;font-size:11px;white-space:nowrap}
td.name{color:#1a1a1a;font-weight:500;position:sticky;left:0;background:#fff;z-index:5;min-width:100px}
tbody tr:hover td.name{background:#fafafa}
td.cat{font-size:10px;color:#999;padding-right:4px;white-space:nowrap}
td.val{text-align:right;font-weight:500;font-size:11px;border-radius:3px;cursor:default}
.note{font-size:11px;color:#aaa;margin-top:10px}
</style>
</head>
<body>
<h1>沪深股市95个行业板块资金轮动热力图（2020–2025）</h1>

<div class="tab-bar">
  <button class="active" onclick="setView('heat',this)">🔥 热力图</button>
  <button onclick="setView('rank',this)">📊 年度排名</button>
  <button onclick="setView('best',this)">🏆 最佳/最差年份</button>
</div>

<div class="controls">
  <label>大类筛选：</label>
  <select id="catFilter" onchange="render()">
    <option value="all">全部板块</option>
    <option value="科技">大科技</option>
    <option value="消费">大消费</option>
    <option value="周期">大周期</option>
    <option value="金融">大金融</option>
    <option value="制造">高端制造</option>
    <option value="医药">医药健康</option>
    <option value="能源">能源资源</option>
  </select>
  <label>排序：</label>
  <select id="sortBy" onchange="render()">
    <option value="cat">按大类</option>
    <option value="avg">按5年均涨幅↓</option>
    <option value="y2025">按2025↓</option>
    <option value="y2024">按2024↓</option>
    <option value="y2023">按2023↓</option>
    <option value="y2022">按2022↓</option>
    <option value="y2021">按2021↓</option>
    <option value="y2020">按2020↓</option>
  </select>
  <input type="text" id="search" placeholder="搜索板块名..." oninput="render()" style="width:130px">
</div>

<div class="legend">
  涨跌幅色阶：
  <div class="lg">
    <span style="background:#7f2020"></span>
    <span style="background:#c0392b"></span>
    <span style="background:#e74c3c"></span>
    <span style="background:#f1948a"></span>
    <span style="background:#fadbd8"></span>
    <span style="background:#f5f5f5"></span>
    <span style="background:#d5f5e3"></span>
    <span style="background:#82e0aa"></span>
    <span style="background:#27ae60"></span>
    <span style="background:#1e8449"></span>
    <span style="background:#145a32"></span>
  </div>
  <span>大涨（>80%）</span>
  <span>涨（>25%）</span>
  <span>微涨</span>
  <span>微跌</span>
  <span>跌（>-25%）</span>
  <span>大跌（>-40%）</span>
</div>

<div class="stat-row" id="statRow"></div>
<div class="tbl-wrap"><table id="mainTable"><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table></div>

  {n:'房地产服务',c:'周期',d:[5,2,-20,-28,-15,-5]},
  {n:'公路/港口',c:'周期',d:[8,5,-12,-5,10,8]},
  {n:'航运',c:'周期',d:[5,35,20,-10,15,12]},

  {n:'保险',c:'金融',d:[15,-5,-18,5,28,15]},
  {n:'多元金融',c:'金融',d:[22,-8,-20,8,25,18]},
  {n:'信托/资管',c:'金融',d:[18,-10,-22,5,20,15]},
];

let currentView = 'heat';

function heatBg(v){
  if(v>=80)  return '#7f2020';
  if(v>=50)  return '#c0392b';
  if(v>=25)  return '#e74c3c';
  if(v>=10)  return '#f1948a';
  if(v>=0)   return '#fadbd8';
  if(v>=-10) return '#d5f5e3';
  if(v>=-25) return '#82e0aa';
  if(v>=-40) return '#27ae60';
  if(v>=-60) return '#1e8449';
  return '#145a32';
}
function heatTxt(v){
  if(v>=50)  return '#fff';
  if(v>=10)  return '#7f0c0c';
  if(v>=0)   return '#922b21';
  if(v>=-25) return '#1a5276';
  return '#fff';
}
function avg(d){ return Math.round(d.reduce((a,b)=>a+b,0)/d.length); }

function getFiltered(){
  const cat = document.getElementById('catFilter').value;
  const q = document.getElementById('search').value.trim().toLowerCase();
  let rows = DATA.filter(r=>(cat==='all'||r.c===cat)&&(q===''||r.n.toLowerCase().includes(q)||r.c.includes(q)));
  const sort = document.getElementById('sortBy').value;
  if(sort==='cat') rows.sort((a,b)=>a.c.localeCompare(b.c)||a.n.localeCompare(b.n));
  else if(sort==='avg') rows.sort((a,b)=>avg(b.d)-avg(a.d));
  else { const yi=parseInt(sort.replace('y',''))-2020; rows.sort((a,b)=>b.d[yi]-a.d[yi]); }
  return rows;
}

function renderStats(rows){
  const allVals=rows.flatMap(r=>r.d);
  const maxV=Math.max(...allVals), minV=Math.min(...allVals);
  const maxR=rows.find(r=>r.d.includes(maxV)), minR=rows.find(r=>r.d.includes(minV));
  const maxY=YEARS[maxR.d.indexOf(maxV)], minY=YEARS[minR.d.indexOf(minV)];
  document.getElementById('statRow').innerHTML=[
    `<div class="stat">显示板块：<b>${rows.length}</b></div>`,
    `<div class="stat">最大涨幅：<b style="color:#c0392b">+${maxV}% ${maxR.n}(${maxY})</b></div>`,
    `<div class="stat">最大跌幅：<b style="color:#27ae60">${minV}% ${minR.n}(${minY})</b></div>`,
  ].join('');
}

function renderHeat(rows){
  document.getElementById('thead').innerHTML=
    `<th style="text-align:left;min-width:100px">板块</th><th style="min-width:36px">类别</th>`+
    YEARS.map(y=>`<th>${y}</th>`).join('')+`<th>均值</th>`;
  document.getElementById('tbody').innerHTML=rows.map(r=>{
    const cells=r.d.map(v=>`<td class="val" style="background:${heatBg(v)};color:${heatTxt(v)}">${v>0?'+':''}${v}%</td>`).join('');
    const a=avg(r.d);
    return `<tr><td class="name">${r.n}</td><td class="cat">${r.c}</td>${cells}<td class="val" style="background:${heatBg(a)};color:${heatTxt(a)};opacity:.85">${a>0?'+':''}${a}%</td></tr>`;
  }).join('');
}

function renderRank(rows){
  document.getElementById('thead').innerHTML=
    `<th style="text-align:left;min-width:100px">板块</th><th>类别</th>`+
    YEARS.map(y=>`<th>${y}排名</th>`).join('');
  const total=rows.length;
  const rankMaps=YEARS.map((_,yi)=>{
    const sorted=[...rows].sort((a,b)=>b.d[yi]-a.d[yi]);
    const m={};sorted.forEach((r,i)=>m[r.n]=i+1);return m;
  });
  document.getElementById('tbody').innerHTML=rows.map(r=>{
    const cells=YEARS.map((_,yi)=>{
      const rk=rankMaps[yi][r.n]||'-';
      let bg='',tc='#666';
      if(typeof rk==='number'){
        const p=rk/total;
        if(p<=0.1){bg='#c0392b';tc='#fff';}
        else if(p<=0.25){bg='#f1948a';tc='#7f0c0c';}
        else if(p>=0.9){bg='#27ae60';tc='#fff';}
        else if(p>=0.75){bg='#82e0aa';tc='#1a5276';}
      }
      return `<td class="val" style="background:${bg};color:${tc}">${rk}</td>`;
    }).join('');
    return `<tr><td class="name">${r.n}</td><td class="cat">${r.c}</td>${cells}</tr>`;
  }).join('');
}

function renderBest(rows){
  document.getElementById('thead').innerHTML=
    `<th style="text-align:left;min-width:100px">板块</th><th>类别</th><th>最佳年</th><th>最佳涨幅</th><th>最差年</th><th>最差涨幅</th><th>5年均值</th><th>上涨胜率</th>`;
  const sorted=[...rows].sort((a,b)=>avg(b.d)-avg(a.d));
  document.getElementById('tbody').innerHTML=sorted.map(r=>{
    const maxV=Math.max(...r.d),minV=Math.min(...r.d);
    const maxY=YEARS[r.d.indexOf(maxV)],minY=YEARS[r.d.indexOf(minV)];
    const a=avg(r.d),wr=Math.round(r.d.filter(v=>v>0).length/r.d.length*100);
    return `<tr>
      <td class="name">${r.n}</td><td class="cat">${r.c}</td>
      <td style="color:#c0392b;font-weight:500">${maxY}</td>
      <td style="color:#c0392b;font-weight:500">+${maxV}%</td>
      <td style="color:#27ae60;font-weight:500">${minY}</td>
      <td style="color:#27ae60;font-weight:500">${minV}%</td>
      <td style="font-weight:500;color:${a>=0?'#c0392b':'#27ae60'}">${a>=0?'+':''}${a}%</td>
      <td><div style="display:flex;align-items:center;gap:4px">
        <div style="width:${wr*0.5}px;height:8px;background:${wr>=50?'#e74c3c':'#82e0aa'};border-radius:2px"></div>
        <span style="font-size:10px">${wr}%</span>
      </div></td>
    </tr>`;
  }).join('');
}

function render(){
  const rows=getFiltered();
  renderStats(rows);
  if(currentView==='heat') renderHeat(rows);
  else if(currentView==='rank') renderRank(rows);
  else renderBest(rows);
}

function setView(v,btn){
  currentView=v;
  document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

render();
</script>
</body>
</html>
